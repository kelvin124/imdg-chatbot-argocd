imagePullSecrets: []

replicaCount: 1

server:

  image:
    tag: "v3.12.0"
    distroless: false
    pullPolicy: IfNotPresent

  statefulSet:
    enabled: true
    pvcDeleteOnStsDelete: false
    pvcDeleteOnStsScale: false

  resources:
    limits:
      cpu: 250m
      memory: 1Gi
    requests:
      cpu: 1m
      memory: 512Mi


  retention: "15d"
  retentionSize: "4GB"

  persistentVolume:
    enabled: true
    statefulSetNameOverride: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: "prometheus-server-pvc"
    size: 5Gi


alertmanager:

  enabled: true

  persistence:
    enabled: true
    annotations: {}
    labels: {}

    storageClass: "prometheus-alertmanager"
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    emptyDir: {}
