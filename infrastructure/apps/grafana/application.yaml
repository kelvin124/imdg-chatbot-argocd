apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: infra
  sources:
    - repoURL: 'https://github.com/kelvin124/imdg-chatbot-argocd'
      targetRevision: main
      ref: current-repo    
    - chart: grafana
      repoURL: 'https://grafana-community.github.io/helm-charts'
      targetRevision: "12.7.1"
      helm:
        valueFiles:
          - $current-repo/infrastructure/apps/grafana/values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true