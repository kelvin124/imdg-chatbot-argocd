apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: infra
  sources:
    - repoURL: 'https://github.com/kelvin124/imdg-chatbot-argocd'
      targetRevision: main
      ref: current-repo  
    - chart: argo-cd
      repoURL: 'https://argoproj.github.io/argo-helm'
      targetRevision: 10.0.0
      helm:
        valueFiles:
          - $current-repo/infrastructure/apps/argocd/values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true